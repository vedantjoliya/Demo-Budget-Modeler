version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apple_dashboard_app
    restart: always
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
